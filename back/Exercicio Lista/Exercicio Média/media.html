<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Calculadora de Média</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 400px;
            margin: auto;
        }

        input,
        button {
            box-sizing: border-box;
        }

        input {
            display: block;
            margin-bottom: 10px;
            padding: 5px;
            width: 100%;
            border: 1px solid #ccc;
            /* deixa igual para comparar */
            border-radius: 3px;
        }

        button {
            padding: 10px;
            width: 100%;
            background-color: #4CAF50;
            color: white;
            border: 1px solid #4CAF50;
            /* mesmo tamanho da borda do input */
            border-radius: 3px;
            cursor: pointer;
            margin: 0;
            /* garantir que não tenha margin extra */
            outline: none;
        }


        #resultado {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>Digite as 4 notas</h2>

    <input type="number" id="nota1" placeholder="Nota 1">
    <input type="number" id="nota2" placeholder="Nota 2">
    <input type="number" id="nota3" placeholder="Nota 3">
    <input type="number" id="nota4" placeholder="Nota 4">

    <button onclick="calcularMedia()">Calcular Média</button>

    <div id="resultado"></div>

    <script src="media.js">
    </script>

</body>

</html>
