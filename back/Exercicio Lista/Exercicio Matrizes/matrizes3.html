<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Cálculo de Custo de Receitas</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      color: #333;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      margin-bottom: 20px;
    }
    th, td {
      padding: 10px;
      text-align: center;
      border: 1px solid #ccc;
    }
    th {
      background-color: #3498db;
      color: white;
    }
    input[type="number"] {
      width: 60px;
      padding: 5px;
      font-size: 14px;
      border-radius: 4px;
      border: 1px solid #bbb;
      text-align: center;
      transition: border-color 0.3s;
    }
    input[type="number"]:focus {
      border-color: #2980b9;
      outline: none;
    }
    button {
      display: block;
      width: 100%;
      padding: 12px 0;
      font-size: 18px;
      background-color: #2980b9;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #1c5980;
    }
    #resultado {
      margin-top: 25px;
      padding: 15px;
      background: #ecf0f1;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>Cálculo de Custo de Receitas</h1>

  <form id="formCusto">

    <table>
      <thead>
        <tr>
          <th>Receita / Ingrediente</th>
          <th>Ingrediente 1</th>
          <th>Ingrediente 2</th>
          <th>Ingrediente 3</th>
          <th>Ingrediente 4</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Receita 1</td>
          <td><input type="number" min="0" value="2" id="q11" /></td>
          <td><input type="number" min="0" value="0" id="q12" /></td>
          <td><input type="number" min="0" value="1" id="q13" /></td>
          <td><input type="number" min="0" value="3" id="q14" /></td>
        </tr>
        <tr>
          <td>Receita 2</td>
          <td><input type="number" min="0" value="1" id="q21" /></td>
          <td><input type="number" min="0" value="2" id="q22" /></td>
          <td><input type="number" min="0" value="0" id="q23" /></td>
          <td><input type="number" min="0" value="1" id="q24" /></td>
        </tr>
        <tr>
          <td>Receita 3</td>
          <td><input type="number" min="0" value="0" id="q31" /></td>
          <td><input type="number" min="0" value="1" id="q32" /></td>
          <td><input type="number" min="0" value="3" id="q33" /></td>
          <td><input type="number" min="0" value="2" id="q34" /></td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <td><strong>Preço por unidade (R$)</strong></td>
          <td><input type="number" min="0" step="0.01" value="5" id="c1" /></td>
          <td><input type="number" min="0" step="0.01" value="3" id="c2" /></td>
          <td><input type="number" min="0" step="0.01" value="10" id="c3" /></td>
          <td><input type="number" min="0" step="0.01" value="2" id="c4" /></td>
        </tr>
      </tfoot>
    </table>

    <button type="submit">Calcular Custos</button>

  </form>

  <div id="resultado"></div>

  <script src="matrizes3.js">

  </script>

</body>
</html>
