<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title>Calculadora de Receita</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px auto;
            max-width: 400px;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        form fieldset {
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 15px 20px;
            margin-bottom: 20px;
            background-color: #fff;
        }

        form legend {
            font-weight: bold;
            padding: 0 10px;
            color: #555;
        }

        label {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 14px;
            color: #444;
        }

        input[type="number"] {
            width: 70px;
            padding: 5px 8px;
            font-size: 14px;
            border: 1px solid #bbb;
            border-radius: 4px;
            transition: border-color 0.3s;
        }

        input[type="number"]:focus {
            border-color: #007bff;
            outline: none;
        }

        button {
            display: block;
            width: 100%;
            margin-top: 10px;
            padding: 10px 0;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #resultado {
            margin-top: 25px;
            padding: 15px;
            background-color: #e9f5ff;
            border: 1px solid #007bff;
            border-radius: 6px;
            font-weight: bold;
            font-size: 16px;
            color: #003366;
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>Calculadora de Receita</h1>

    <form id="formReceita">
        <fieldset>
            <legend><strong>Vendas</strong> (quantidade)</legend>

            <label>Mês :
                Produto A <input type="number" id="vendaM1P1" value="12" min="0" />
                Produto B <input type="number" id="vendaM1P2" value="7" min="0" />
            </label>
        
        </fieldset>

        <fieldset>
            <legend><strong>Preços</strong> (em R$)</legend>

            <label>Produto A <input type="number" id="precoP1" value="25" min="0" step="0.01" /></label>
            <label>Produto B <input type="number" id="precoP2" value="30" min="0" step="0.01" /></label>
        </fieldset>

        <button type="submit">Calcular Receita</button>
    </form>

    <div id="resultado"></div>

    <script src="matrizes.js">
    </script>

</body>

</html>
