<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Tabela Moderna</title>
<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>📊 Tabela + Top</h1>

<div class="container">

    <div class="form">
        <input type="text" id="nome" placeholder="Nome">
        <input type="number" id="idade" placeholder="Idade">
        <button onclick="adicionar()">➕ Adicionar</button>
    </div>

    <input class="search" type="text" id="filtro" placeholder="🔍 Buscar..." onkeyup="filtrar()">

    <table id="tabela">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<script src="script.js">

</script>

</body>
</html>
