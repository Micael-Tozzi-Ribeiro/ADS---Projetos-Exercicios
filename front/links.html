<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painéis Solares</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Títulos */
        h1, h2, h3, h4, h5, h6 {
            margin: 10px 0;
            color: #1e3a8a;
        }

        h1 { font-size: 36px; }
        h2 { font-size: 30px; }
        h3 { font-size: 26px; }
        h4 { font-size: 22px; }
        h5 { font-size: 18px; }
        h6 { font-size: 14px; color: #555; }

        /* Texto */
        p {
            color: #333;
            font-size: 18px;
            margin: 20px 0;
            line-height: 1.6;
        }

        /* Botão (link) */
        a {
            display: inline-block;
            margin: 20px 0;
            padding: 12px 24px;
            background-color: #facc15;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        a:hover {
            background-color: #eab308;
            transform: scale(1.05);
        }

        /* Imagem */
        img {
            width: 80%;
            max-width: 500px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* Responsividade */
        @media (max-width: 600px) {
            h1 { font-size: 28px; }
            p { font-size: 16px; }
            a { padding: 10px 20px; }
        }
    </style>
</head>

<body>

    <h1>Painéis Solares</h1>
    <h2>Energia limpa para o seu futuro</h2>

    <p>
        Conheça a melhor empresa <br>
        de <br>
        painéis solares do mercado
    </p>

    <a href="https://simulacao.dalsun.com.br" target="_blank">
        Faça sua simulação de energia solar
    </a>

    <br>

    <img src="img/painel solar.jpg" alt="Painéis solares instalados">

    <!-- Exemplos de títulos -->
    <h3>Vantagens</h3>
    <h4>Economia de energia</h4>
    <h5>Sustentabilidade</h5>
    <h6>Fonte renovável e limpa</h6>

</body>
</html>
